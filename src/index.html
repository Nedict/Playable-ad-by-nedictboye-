<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Defend the Core - Playable Demo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="ad-container">
        <canvas id="gameCanvas"></canvas>

        <div id="tutorial-overlay" class="overlay">
            <h1>Defend The Core</h1>
            <p>Tap the incoming rogue data crystals before they hit the energy core!</p>
            <button class="btn" id="start-btn">Tap to Play</button>
        </div>

        <div id="cta-overlay" class="overlay hidden">
            <h1 id="end-title">Victory!</h1>
            <p id="end-subtitle">Your system is secure. Want to play more levels?</p>
            <button class="btn" id="cta-btn">Download Now</button>
        </div>
    </div>

    <script src="js/entities.js"></script>
    <script src="js/game.js"></script>
</body>
          </html>
