<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit Defender - Mini Game Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #050510; font-family: monospace; }
        #game-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; max-width: 100%; max-height: 100%; }
        .ui-layer { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; color: #00ffcc; font-size: 1.2rem; font-weight: bold; pointer-events: none; text-shadow: 0 0 10px #00ffcc; }
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 16, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center; }
        h1 { font-size: 2.5rem; color: #00ffcc; margin-bottom: 10px; text-shadow: 0 0 15px #00ffcc; letter-spacing: 3px; }
        p { color: #8892b0; margin-bottom: 30px; font-size: 1rem; max-width: 300px; line-height: 1.5; }
        .start-btn { padding: 15px 40px; font-size: 1.2rem; background: transparent; border: 2px solid #00ffcc; color: #00ffcc; font-family: monospace; cursor: pointer; box-shadow: 0 0 15px rgba(0,255,204,0.2); transition: 0.2s; font-weight: bold; }
        .start-btn:active { background: #00ffcc; color: #050510; box-shadow: 0 0 25px #00ffcc; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="orbitCanvas"></canvas>
        
        <div class="ui-layer">
            <div id="score-display">SCORE: 0</div>
            <div id="level-display">LVL: 1</div>
        </div>

        <div id="menu-overlay">
            <h1 id="menu-title">ORBIT DEFENDER</h1>
            <p id="menu-desc">Hold down anywhere on the screen to reverse orbit direction and surge speed. Protect the core.</p>
            <button class="start-btn" id="action-btn">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('orbitCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = 'MENU';
        let score = 0;
        let level = 1;
        let coreHealth = 100;
        
        // Configuration Matrix
        const DESIGN_SIZE = 800; // Rigid coordinate matching standard
        let center = { x: 400, y: 400 };
        
        let planet = { radius: 55, pulse: 0 };
        let player = { radius: 12, orbitRadius: 160, angle: 0, speed: 0.03, direction: 1, isBoosting: false };
        let asteroids = [];
        let particles = [];
        let spawnRate = 90; // Frame interval
        let spawnTimer = 0;

        function resize() {
            const size = Math.min(window.innerWidth, window.innerHeight);
            canvas.width = size;
            canvas.height = size;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(size / DESIGN_SIZE, size / DESIGN_SIZE);
        }
        window.addEventListener('resize', resize);
        resize();

        class Asteroid {
            constructor() {
                const angle = Math.random() * Math.PI * 2;
                const distance = 500; // Outside view
                this.x = center.x + Math.cos(angle) * distance;
                this.y = center.y + Math.sin(angle) * distance;
                this.radius = Math.random() * 8 + 10;
                this.speed = (1.5 + Math.random() * 1.5) * (1 + level * 0.15);
                
                const targetAngle = Math.atan2(center.y - this.y, center.x - this.x);
                this.vx = Math.cos(targetAngle) * this.speed;
                this.vy = Math.sin(targetAngle) * this.speed;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
            }
            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff3366';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff3366';
                ctx.fill();
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.radius = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = 0.02;
            }
            update() { this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
        }

        // --- Controller Triggers ---
        function setInput(active) {
            if (gameState !== 'PLAYING') return;
            player.isBoosting = active;
            if (active) {
                player.direction *= -1; // Reverse orbit flow vectors on touch down
            }
        }

        window.addEventListener('mousedown', () => setInput(true));
        window.addEventListener('mouseup', () => setInput(false));
        window.addEventListener('touchstart', (e) => { e.preventDefault(); setInput(true); });
        window.addEventListener('touchend', () => setInput(false));

        document.getElementById('action-btn').addEventListener('click', () => {
            if (gameState === 'MENU' || gameState === 'GAMEOVER') {
                score = 0; level = 1; coreHealth = 100; asteroids = []; particles = [];
                gameState = 'PLAYING';
                document.getElementById('menu-overlay').style.display = 'none';
            }
        });

        function triggerExplosion(x, y, color, count = 10) {
            for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Player mechanics
            const currentSpeed = player.isBoosting ? player.speed * 2.2 : player.speed;
            player.angle += currentSpeed * player.direction;
            player.x = center.x + Math.cos(player.angle) * player.orbitRadius;
            player.y = center.y + Math.sin(player.angle) * player.orbitRadius;

            // Engine trail particles
            if (Math.random() > 0.4) {
                particles.push(new Particle(player.x, player.y, 'rgba(0, 255, 255, 0.5)'));
            }

            // Spawn management
            spawnTimer++;
            if (spawnTimer >= Math.max(30, spawnRate - (level * 8))) {
                asteroids.push(new Asteroid());
                spawnTimer = 0;
            }

            // Asteroids loops
            for (let i = asteroids.length - 1; i >= 0; i--) {
                asteroids[i].update();

                // Player intercept collision
                let distToPlayer = Math.hypot(asteroids[i].x - player.x, asteroids[i].y - player.y);
                if (distToPlayer < asteroids[i].radius + player.radius) {
                    triggerExplosion(asteroids[i].x, asteroids[i].y, '#00ffcc', 15);
                    asteroids.splice(i, 1);
                    score += 10;
                    document.getElementById('score-display').innerText = `SCORE: ${score}`;
                    
                    // Progression Check
                    if (score % 50 === 0) {
                        level++;
                        document.getElementById('level-display').innerText = `LVL: ${level}`;
                    }
                    continue;
                }

                // Core planet collision
                let distToCore = Math.hypot(asteroids[i].x - center.x, asteroids[i].y - center.y);
                if (distToCore < asteroids[i].radius + planet.radius) {
                    triggerExplosion(asteroids[i].x, asteroids[i].y, '#ff3366', 20);
                    coreHealth -= 25;
                    asteroids.splice(i, 1);
                    
                    if (coreHealth <= 0) {
                        gameState = 'GAMEOVER';
                        document.getElementById('menu-title').innerText = `SYSTEM FAILED`;
                        document.getElementById('menu-desc').innerText = `The core collapsed at level ${level}. Score achieved: ${score}`;
                        document.getElementById('action-btn').innerText = `REBOOT SYSTEMS`;
                        document.getElementById('menu-overlay').style.display = 'flex';
                    }
                    continue;
                }
            }

            // Update remaining particles
            for(let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            planet.pulse += 0.03;
        }

        function draw() {
            // Space background clearing matrices
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, DESIGN_SIZE, DESIGN_SIZE);

            // Orbit Ring guideline vector
            ctx.beginPath();
            ctx.arc(center.x, center.y, player.orbitRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.08)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Central Planet Core drawing
            ctx.save();
            ctx.beginPath();
            let pRadius = planet.radius + Math.sin(planet.pulse) * 3;
            ctx.arc(center.x, center.y, pRadius, 0, Math.PI * 2);
            ctx.fillStyle = coreHealth > 50 ? '#11163a' : '#3a111a';
            ctx.strokeStyle = coreHealth > 50 ? '#00ffcc' : '#ff3366';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 20;
            ctx.shadowColor = ctx.strokeStyle;
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            // Player Ship Render
            if (gameState === 'PLAYING') {
                ctx.save();
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#00ffcc';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffcc';
                ctx.fill();
                ctx.restore();
            }

            // Draw objects
            asteroids.forEach(a => a.draw());
            particles.forEach(p => p.draw());
        }

        function engineLoop() {
            update();
            draw();
            requestAnimationFrame(engineLoop);
        }

        requestAnimationFrame(engineLoop);
    </script>
</body>
  </html>
